services:
  lm-mcp:
    build: .
    restart: unless-stopped
    env_file: .env
    # Bind to localhost only — Cloudflare Tunnel (below) fronts the public hostname.
    # If you instead expose it via a proxied DNS record, publish on the host and
    # firewall the port to Cloudflare IP ranges.
    ports:
      - "127.0.0.1:8930:8930"
    # Join the CRM's network (READ/PROPOSE tools reach the CRM API by service
    # name — CRM_BASE_URL=http://backend:3000) AND the WebPages network (the
    # Apache ingress container proxies lm-mcp.liquidmindmedia.com to
    # http://lm-mcp:8930 by name — see config/lm-mcp.conf).
    networks:
      - crm
      - webpages

  # Optional: run the Cloudflare Tunnel as a sidecar so the origin needs no open
  # inbound ports. Create the tunnel + token in the Cloudflare Zero Trust dashboard
  # and put TUNNEL_TOKEN in .env. With this, point the tunnel's public hostname
  # (lm-mcp.website.com) at http://lm-mcp:8930.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${TUNNEL_TOKEN}
  #   depends_on:
  #     - lm-mcp

networks:
  crm:
    external: true
    # The network the Liquid-Mind-CRM stack created. Compose names it
    # "<project>_default" — usually "liquid-mind-crm_default". VERIFY on the
    # droplet with `docker network ls` and change the name below if it differs.
    name: liquid-mind-crm_default
  webpages:
    external: true
    # The LiquidMindWebPages stack's network — the Apache ingress (web) lives
    # here. VERIFY with `docker network ls` on the droplet.
    name: liquidmindwebpages_default
