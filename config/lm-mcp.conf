# Apache vhost for the LiquidMind MCP server (lm-mcp.liquidmindmedia.com).
# Modeled on kdp-api.conf. Deploy on the droplet:
#   sudo cp config/lm-mcp.conf /etc/apache2/sites-available/lm-mcp.conf
#   sudo a2ensite lm-mcp
#   docker exec liquidmindwebpages-web-1 apachectl configtest   # want "Syntax OK"
#   docker exec liquidmindwebpages-web-1 apachectl -k graceful
#
# Apache runs INSIDE the liquidmindwebpages-web container, so the proxy target is
# the lm-mcp container BY NAME over the shared liquidmindwebpages_default network
# (see docker-compose.yml `networks:`). Never use localhost/127.0.0.1 here — that
# is the web container itself. Requires a dedicated Cloudflare Origin Certificate
# for this subdomain (the ad-tools origin cert is single-host).

<VirtualHost *:443>
    ServerName lm-mcp.liquidmindmedia.com

    SSLEngine on
    SSLCertificateFile    /etc/ssl/cloudflare/lm-mcp.liquidmindmedia.com.pem
    SSLCertificateKeyFile /etc/ssl/cloudflare/lm-mcp.liquidmindmedia.com.key
    SSLProtocol TLSv1.2 TLSv1.3

    # Forward everything to the MCP container. MCP streamable-HTTP uses long-lived
    # SSE responses; raise the proxy timeout so idle streams aren't cut at 60s.
    ProxyPreserveHost On
    ProxyTimeout 600
    ProxyPass        / http://lm-mcp:8930/
    ProxyPassReverse / http://lm-mcp:8930/

    ErrorLog  ${APACHE_LOG_DIR}/lm-mcp-error.log
    CustomLog ${APACHE_LOG_DIR}/lm-mcp-access.log combined
</VirtualHost>
